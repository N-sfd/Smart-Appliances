<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" role="img" aria-labelledby="contactHeroTitle">
  <title id="contactHeroTitle">Smart Appliances support team helping with a service request</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EAF2FF"/>
      <stop offset="1" stop-color="#CFE2FF"/>
    </linearGradient>
  </defs>

  <rect width="480" height="360" fill="url(#bg)"/>

  <!-- soft decorative circles -->
  <circle cx="422" cy="56" r="52" fill="#1A73E8" opacity="0.08"/>
  <circle cx="42" cy="308" r="66" fill="#0B3D91" opacity="0.07"/>

  <!-- calendar / scheduling icon -->
  <g transform="translate(52 74)">
    <rect x="0" y="8" width="56" height="48" rx="8" fill="#FFFFFF" stroke="#0B3D91" stroke-width="4"/>
    <rect x="0" y="8" width="56" height="16" rx="6" fill="#1A73E8"/>
    <rect x="12" y="0" width="6" height="16" rx="3" fill="#0B3D91"/>
    <rect x="38" y="0" width="6" height="16" rx="3" fill="#0B3D91"/>
    <circle cx="16" cy="40" r="4" fill="#1A73E8"/>
    <circle cx="30" cy="40" r="4" fill="#CFE2FF"/>
    <circle cx="44" cy="40" r="4" fill="#CFE2FF"/>
  </g>

  <!-- chat / support bubble -->
  <g transform="translate(346 58)">
    <rect x="0" y="0" width="86" height="56" rx="16" fill="#FFFFFF" stroke="#1A73E8" stroke-width="4"/>
    <path d="M16 56 6 74 32 56" fill="#FFFFFF" stroke="#1A73E8" stroke-width="4" stroke-linejoin="round"/>
    <circle cx="24" cy="28" r="6" fill="#1A73E8"/>
    <circle cx="43" cy="28" r="6" fill="#4FC3F7"/>
    <circle cx="62" cy="28" r="6" fill="#1A73E8"/>
  </g>

  <!-- support agent, seated (torso drawn first so the desk overlaps its lower half) -->
  <path d="M176 260 Q176 196 240 192 Q304 196 304 260 Z" fill="#0B3D91"/>
  <circle cx="240" cy="150" r="36" fill="#0B3D91"/>
  <!-- headset -->
  <path d="M204 150a36 36 0 0 1 72 0" fill="none" stroke="#1A73E8" stroke-width="7" stroke-linecap="round"/>
  <circle cx="204" cy="152" r="7" fill="#1A73E8"/>
  <path d="M204 159 q-4 14 12 16" fill="none" stroke="#1A73E8" stroke-width="6" stroke-linecap="round"/>
  <circle cx="217" cy="176" r="4.5" fill="#4FC3F7"/>

  <!-- desk -->
  <rect x="60" y="256" width="360" height="18" rx="8" fill="#0B3D91"/>
  <rect x="82" y="274" width="16" height="50" fill="#0B3D91"/>
  <rect x="382" y="274" width="16" height="50" fill="#0B3D91"/>

  <!-- laptop on the desk -->
  <rect x="182" y="252" width="128" height="10" rx="5" fill="#0B3D91"/>
  <rect x="190" y="188" width="100" height="66" rx="8" fill="#FFFFFF" stroke="#0B3D91" stroke-width="4"/>
  <rect x="200" y="198" width="80" height="46" rx="4" fill="#E8F1FF"/>
  <path d="M222 222 l14 14 26-30" fill="none" stroke="#1A9E5C" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
