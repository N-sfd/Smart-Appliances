<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/favicon.svg" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1A73E8" />
    <meta
      name="description"
      content="Smart Appliances — fast, trusted appliance repair, installation, HVAC, plumbing, electrical, smart home setup, and 24/7 emergency service."
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/images/logo-mark.png" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!-- LCP: fetch hero before JS bundle; high priority on preload + img -->
    <link
      rel="preload"
      as="image"
      href="%PUBLIC_URL%/images/services/hero-appliance-technician.webp"
      type="image/webp"
      fetchpriority="high"
    />
    <style>
      /* Static LCP poster — discoverable in HTML, hidden once React mounts */
      #lcp-hero {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: 54% 38%;
        z-index: 0;
        pointer-events: none;
        background-color: #0b2d6b;
      }
      body:has(#root:not(:empty)) #lcp-hero {
        display: none;
      }
    </style>
    <title>Smart Appliances — Appliance Repair & Home Services</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <img
      id="lcp-hero"
      src="%PUBLIC_URL%/images/services/hero-appliance-technician.webp"
      alt="Certified appliance repair technician"
      width="1200"
      height="900"
      fetchpriority="high"
      decoding="sync"
    />
    <!--
      This HTML file is a template.
      If you open it directly in the browser, you will see an empty page.

      You can add webfonts, meta tags, or analytics to this file.
      The build step will place the bundled scripts into the <body> tag.

      To begin the development, run `npm start` or `yarn start`.
      To create a production bundle, use `npm run build` or `yarn build`.
    -->
  </body>
</html>
